 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Management — Jane Aubrey Art</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #f0ece3; }
    .hk-header {
      background: var(--slate-dark);
      color: var(--linen);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hk-header h1 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 300; }
    .hk-header p { font-size: 0.8rem; color: var(--stone); margin-top: 0.2rem; }
    .hk-header a { color: var(--coast); font-size: 0.85rem; }
    .hk-page { max-width: 900px; margin: 0 auto; padding: 2rem; }
    .hk-section { background: var(--white); box-shadow: var(--shadow-card); margin-bottom: 2rem; overflow: hidden; }
    .hk-section-head {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--sand);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hk-section-head h2 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 400; }
    .hk-section-body { padding: 1.5rem; }
    .badge { display: inline-block; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 2px; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    .badge-warn { background: #fef3c7; color: #92400e; }
    .upload-area {
      border: 2px dashed var(--sand);
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.5rem;
    }
    .upload-area:hover { border-color: var(--coast); background: #f8fbfc; }
    .upload-area input { display: none; }
    .upload-area .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .upload-area p { font-size: 0.88rem; color: var(--stone); }
    .upload-area .preview-img { max-height: 200px; margin: 0 auto 1rem; display: none; box-shadow: var(--shadow-card); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn-sm { font-size: 0.72rem; padding: 0.4rem 0.9rem; letter-spacing: 0.08em; }
    .btn-danger { border-color: #b91c1c; color: #b91c1c; }
    .btn-danger:hover { background: #b91c1c; color: white; }
    .btn-sold { border-color: var(--slate); color: var(--slate); }
    .btn-sold:hover { background: var(--slate); color: var(--linen); }
    .pic-list { list-style: none; }
    .pic-item { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 0; border-bottom: 1px solid var(--sand); }
    .pic-item:last-child { border-bottom: none; }
    .pic-thumb { width: 70px; height: 70px; object-fit: cover; flex-shrink: 0; background: var(--sand); }
    .pic-info { flex: 1; min-width: 0; }
    .pic-title { font-weight: 500; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pic-meta { font-size: 0.78rem; color: var(--stone); margin-top: 0.15rem; }
    .pic-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .status-msg { padding: 0.85rem 1.1rem; font-size: 0.85rem; margin-bottom: 1rem; display: none; border-radius: 2px; }
    .status-msg.success { background: #dcfce7; color: #166534; border-left: 3px solid #16a34a; }
    .status-msg.error { background: #fee2e2; color: #991b1b; border-left: 3px solid #b91c1c; }
    .status-msg.loading { background: #dbeafe; color: #1e40af; border-left: 3px solid #3b82f6; }
    .empty-note { font-size: 0.88rem; color: var(--stone); font-style: italic; padding: 1rem 0; }
    .progress-wrap { background: var(--sand); height: 4px; margin-bottom: 1rem; display: none; }
    .progress-bar { height: 100%; background: var(--coast); width: 0%; transition: width 0.3s; }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .pic-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="hk-header">
    <div>
      <h1>Site management</h1>
      <p>Jane Aubrey Art — housekeeping</p>
    </div>
    <a href="index.html">← View website</a>
  </div>

  <div class="hk-page">

    <div class="hk-section">
      <div class="hk-section-head">
        <h2>Add a new painting for sale</h2>
      </div>
      <div class="hk-section-body">
        <div id="add-status" class="status-msg"></div>
        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="upload-area" onclick="document.getElementById('new-image').click()">
          <input type="file" id="new-image" accept="image/*" onchange="previewImage(this)">
          <img id="preview-img" class="preview-img" alt="Preview">
          <div class="upload-icon">🖼️</div>
          <p><strong>Click to choose a photo</strong><br>JPG or PNG, at least 1200px wide for best quality</p>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="new-title">Title <span style="color:var(--coast)">*</span></label>
            <input type="text" id="new-title" placeholder="e.g. Cape Cornwall, Evening">
          </div>
          <div class="form-group">
            <label for="new-price">Price (£) <span style="color:var(--coast)">*</span></label>
            <input type="number" id="new-price" placeholder="e.g. 75" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="new-medium">Medium</label>
            <input type="text" id="new-medium" placeholder="e.g. Watercolour" value="Watercolour">
          </div>
          <div class="form-group">
            <label for="new-year">Year painted</label>
            <input type="number" id="new-year" placeholder="e.g. 2024">
          </div>
        </div>
        <div class="form-group">
          <label for="new-dimensions">Dimensions (optional)</label>
          <input type="text" id="new-dimensions" placeholder="e.g. 40 × 30 cm">
        </div>
        <button class="btn btn-filled" onclick="addPainting()" id="add-btn">
          Upload &amp; add to For Sale
        </button>
      </div>
    </div>

    <div class="hk-section">
      <div class="hk-section-head">
        <h2>Currently for sale</h2>
        <span class="badge badge-info" id="forsale-count">Loading…</span>
      </div>
      <div class="hk-section-body">
        <div id="forsale-status" class="status-msg"></div>
        <ul class="pic-list" id="forsale-list">
          <li class="empty-note">Loading…</li>
        </ul>
      </div>
    </div>

    <div class="hk-section">
      <div class="hk-section-head">
        <h2>Sold works archive</h2>
        <span class="badge badge-warn" id="sold-count">Loading…</span>
      </div>
      <div class="hk-section-body">
        <div id="sold-status" class="status-msg"></div>
        <ul class="pic-list" id="sold-list">
          <li class="empty-note">Loading…</li>
        </ul>
      </div>
    </div>

  </div>

  <script>
    const CONFIG = {
      cloudName:    'ddsl1ouhn',
      uploadPreset: 'janeaubreyart',
      githubToken:  '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',
      githubOwner:  'janeaubrey',
      githubRepo:   'janeaubreyart.github.io',
      githubBranch: 'main'
    };

    let forsaleData = [];
    let soldData    = [];

    async function init() {
      try {
        const [fs, sold] = await Promise.all([
          fetch('data/forsale.json?t=' + Date.now()).then(r => r.json()).catch(() => []),
          fetch('data/sold.json?t='    + Date.now()).then(r => r.json()).catch(() => [])
        ]);
        forsaleData = fs;
        soldData    = sold;
        renderForsale();
        renderSold();
      } catch(e) {
        showStatus('add-status', 'error', 'Could not load painting data.');
      }
    }

    function renderForsale() {
      const list = document.getElementById('forsale-list');
      document.getElementById('forsale-count').textContent = forsaleData.length + ' paintings';
      if (!forsaleData.length) { list.innerHTML = '<li class="empty-note">No paintings for sale yet.</li>'; return; }
      list.innerHTML = '';
      forsaleData.forEach((item, i) => {
        const li = document.createElement('li');
        li.className = 'pic-item';
        li.innerHTML = `
          <img class="pic-thumb" src="${item.cloudUrl || 'images/gallery/' + item.image}" alt="${item.title}" onerror="this.style.opacity=0.3">
          <div class="pic-info">
            <p class="pic-title">${item.title}</p>
            <p class="pic-meta">${item.medium || 'Watercolour'}${item.year ? ' · ' + item.year : ''} · £${Number(item.price).toLocaleString('en-GB')}</p>
          </div>
          <div class="pic-actions">
            <button class="btn btn-sm btn-sold" onclick="markAsSold(${i})">Mark sold</button>
            <button class="btn btn-sm btn-danger" onclick="removePainting(${i})">Remove</button>
          </div>`;
        list.appendChild(li);
      });
    }

    function renderSold() {
      const list = document.getElementById('sold-list');
      document.getElementById('sold-count').textContent = soldData.length + ' paintings';
      if (!soldData.length) { list.innerHTML = '<li class="empty-note">No sold works yet.</li>'; return; }
      list.innerHTML = '';
      soldData.forEach((item, i) => {
        const li = document.createElement('li');
        li.className = 'pic-item';
        li.innerHTML = `
          <img class="pic-thumb" src="${item.cloudUrl || 'images/sold/' + item.image}" alt="${item.title}" onerror="this.style.opacity=0.3">
          <div class="pic-info">
            <p class="pic-title">${item.title}</p>
            <p class="pic-meta">${item.medium || 'Watercolour'}${item.year ? ' · ' + item.year : ''} · Sold${item.soldYear ? ' ' + item.soldYear : ''}</p>
          </div>
          <div class="pic-actions">
            <button class="btn btn-sm btn-danger" onclick="removeSold(${i})">Remove</button>
          </div>`;
        list.appendChild(li);
      });
    }

    function previewImage(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.getElementById('preview-img');
        img.src = e.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(input.files[0]);
    }

    async function addPainting() {
      const title  = document.getElementById('new-title').value.trim();
      const price  = document.getElementById('new-price').value.trim();
      const medium = document.getElementById('new-medium').value.trim() || 'Watercolour';
      const year   = document.getElementById('new-year').value.trim();
      const dims   = document.getElementById('new-dimensions').value.trim();
      const file   = document.getElementById('new-image').files[0];
      if (!title || !price) { showStatus('add-status', 'error', 'Please enter at least a title and price.'); return; }
      if (!file) { showStatus('add-status', 'error', 'Please choose an image file.'); return; }
      const btn = document.getElementById('add-btn');
      btn.disabled = true; btn.textContent = 'Uploading…';
      showStatus('add-status', 'loading', 'Uploading image…');
      showProgress(0);
      try {
        const cloudUrl = await uploadToCloudinary(file);
        showStatus('add-status', 'loading', 'Image uploaded. Saving to site…');
        showProgress(60);
        const newItem = { id: Date.now(), title, price: Number(price), medium, year: year || '', dimensions: dims, cloudUrl, image: '' };
        const newData = [...forsaleData, newItem];
        await updateGitHubFile('data/forsale.json', newData, 'Add painting: ' + title);
        showProgress(100);
        forsaleData = newData;
        renderForsale();
        showStatus('add-status', 'success', '✓ "' + title + '" added to For Sale. It will appear on the site within a minute.');
        document.getElementById('new-title').value = '';
        document.getElementById('new-price').value = '';
        document.getElementById('new-year').value = '';
        document.getElementById('new-dimensions').value = '';
        document.getElementById('new-image').value = '';
        document.getElementById('preview-img').style.display = 'none';
      } catch(e) {
        showStatus('add-status', 'error', 'Error: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Upload & add to For Sale';
        setTimeout(() => hideProgress(), 1500);
      }
    }

    async function markAsSold(index) {
      const item = forsaleData[index];
      if (!confirm('Mark "' + item.title + '" as sold?')) return;
      showStatus('forsale-status', 'loading', 'Marking "' + item.title + '" as sold…');
      try {
        const soldItem   = { ...item, soldYear: new Date().getFullYear() };
        const newForsale = forsaleData.filter((_, i) => i !== index);
        const newSold    = [...soldData, soldItem];
        await updateGitHubFile('data/forsale.json', newForsale, 'Mark as sold: ' + item.title);
        await updateGitHubFile('data/sold.json',    newSold,    'Add to sold: '  + item.title);
        forsaleData = newForsale; soldData = newSold;
        renderForsale(); renderSold();
        showStatus('forsale-status', 'success', '✓ "' + item.title + '" moved to Sold.');
      } catch(e) { showStatus('forsale-status', 'error', 'Error: ' + e.message); }
    }

    async function removePainting(index) {
      const item = forsaleData[index];
      if (!confirm('Permanently remove "' + item.title + '" from the site?')) return;
      showStatus('forsale-status', 'loading', 'Removing…');
      try {
        const newData = forsaleData.filter((_, i) => i !== index);
        await updateGitHubFile('data/forsale.json', newData, 'Remove painting: ' + item.title);
        forsaleData = newData; renderForsale();
        showStatus('forsale-status', 'success', '✓ "' + item.title + '" removed.');
      } catch(e) { showStatus('forsale-status', 'error', 'Error: ' + e.message); }
    }

    async function removeSold(index) {
      const item = soldData[index];
      if (!confirm('Remove "' + item.title + '" from the sold archive?')) return;
      showStatus('sold-status', 'loading', 'Removing…');
      try {
        const newData = soldData.filter((_, i) => i !== index);
        await updateGitHubFile('data/sold.json', newData, 'Remove from sold: ' + item.title);
        soldData = newData; renderSold();
        showStatus('sold-status', 'success', '✓ "' + item.title + '" removed from sold archive.');
      } catch(e) { showStatus('sold-status', 'error', 'Error: ' + e.message); }
    }

    async function uploadToCloudinary(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CONFIG.uploadPreset);
      formData.append('folder', 'gallery');
      const response = await fetch('https://api.cloudinary.com/v1_1/' + CONFIG.cloudName + '/image/upload', { method: 'POST', body: formData });
      if (!response.ok) throw new Error('Cloudinary upload failed');
      const data = await response.json();
      return data.secure_url;
    }

    async function updateGitHubFile(path, data, message) {
      const apiBase = 'https://api.github.com/repos/' + CONFIG.githubOwner + '/' + CONFIG.githubRepo + '/contents/' + path;
      const headers = {
        'Authorization': 'token ' + CONFIG.githubToken,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      };
      const current = await fetch(apiBase + '?ref=' + CONFIG.githubBranch, { headers });
      let sha = null;
      if (current.ok) { const d = await current.json(); sha = d.sha; }
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
      const body = { message, content, branch: CONFIG.githubBranch };
      if (sha) body.sha = sha;
      const response = await fetch(apiBase, { method: 'PUT', headers, body: JSON.stringify(body) });
      if (!response.ok) { const err = await response.json(); throw new Error(err.message || 'GitHub update failed'); }
    }

    function showStatus(id, type, message) {
      const el = document.getElementById(id);
      el.className = 'status-msg ' + type;
      el.textContent = message;
      el.style.display = 'block';
      if (type === 'success') setTimeout(() => el.style.display = 'none', 5000);
    }

    function showProgress(pct) {
      document.getElementById('progress-wrap').style.display = 'block';
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    function hideProgress() {
      document.getElementById('progress-wrap').style.display = 'none';
      document.getElementById('progress-bar').style.width = '0%';
    }

    init();
  </script>
</body>
</html>
